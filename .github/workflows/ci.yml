name: CI

on:
  push:
    branches: [main, repo-cleanup-before-external-alpha, github-actions-stabilization]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.83
        with:
          components: rustfmt, clippy

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,docs,release]'

      - name: Rust format
        run: cargo fmt --all -- --check

      - name: Rust tests
        run: cargo test

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Ruff format
        run: ruff format --check .

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy python/pyabundance

      - name: Pytest
        run: pytest -q

      - name: Coverage
        if: matrix.python-version == '3.11'
        run: pytest --cov=pyabundance --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Repository hygiene
        run: python scripts/check_repo_hygiene.py

      - name: GitHub Actions sanity
        run: python scripts/check_github_actions.py

      - name: Upload coverage XML
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
