site_name: pyabundance
site_description: Clean-room Rust + Python ecological abundance modelling library
repo_url: https://github.com/conservation-leaders/pyabundance
theme:
  name: material
nav:
  - Home: index.md
  - Installation: INSTALLATION.md
  - Quickstart: QUICKSTART.md
  - Guided analysis: GUIDED_ANALYSIS.md
  - Formula API: FORMULA_API.md
  - Uncertainty: UNCERTAINTY.md
  - Posterior Abundance: POSTERIOR_ABUNDANCE.md
  - Model Selection & Reporting: MODEL_SELECTION_REPORTING.md
  - K Selection: K_SELECTION.md
  - Validation:
      - pcount validation fixtures: validation/PCOUNT_VALIDATION_FIXTURES.md
      - Mallard unmarked comparison: validation/MALLARD_UNMARKED_COMPARISON.md
  - Benchmarks:
      - Running Benchmarks: benchmarks/BENCHMARKS.md
      - Local Benchmark Caveat: benchmarks/LOCAL_BENCHMARK_CAVEAT.md
  - Limitations: LIMITATIONS.md
  - API Reference:
      - Overview: api/index.md
      - pcount: api/pcount.md
      - Results: api/result.md
      - Formula/Data: api/formula.md
      - Simulation: api/simulation.md
      - Model Selection: api/model_selection.md
      - Datasets: api/datasets.md
  - Development:
      - Contributor Onboarding: CONTRIBUTOR_ONBOARDING.md
      - Contributing: development/CONTRIBUTING.md
      - Clean-room Policy: development/CLEAN_ROOM_POLICY.md
      - Repository Hygiene: development/REPOSITORY_HYGIENE.md
      - Performance Architecture: development/PERFORMANCE_ARCHITECTURE.md
      - Shared Core Architecture: development/SHARED_CORE_ARCHITECTURE.md
      - GitHub Actions: development/GITHUB_ACTIONS.md
      - GitHub Actions Stabilization: development/GITHUB_ACTIONS_STABILIZATION.md
      - Cleanup Inventory: development/CLEANUP_INVENTORY.md
      - Cleanup Summary: development/REPO_CLEANUP_SUMMARY.md
  - Release:
      - External Alpha Review: release/EXTERNAL_ALPHA_REVIEW.md
      - External Alpha Execution Status: release/EXTERNAL_ALPHA_EXECUTION_STATUS.md
      - External Alpha Invitation: release/EXTERNAL_ALPHA_INVITATION.md
      - External Alpha Tracker: release/EXTERNAL_ALPHA_TRACKER.md
      - RC Feedback Triage: release/RC_FEEDBACK_TRIAGE.md
      - Reviewer Feedback Template: release/REVIEWER_FEEDBACK_TEMPLATE.md
      - TestPyPI Rehearsal: release/TESTPYPI_REHEARSAL.md
      - Release Checklist: release/RELEASE_CHECKLIST.md
      - PyPI Release Process: release/PYPI_RELEASE_PROCESS.md
      - Docs Deployment: release/DOCS_DEPLOYMENT.md
      - API Freeze: release/API_FREEZE.md
      - v1.0.0rc1 Release Notes: release/RELEASE_NOTES_1.0.0rc1.md
      - v1.0.0rc2 Release Notes: release/RELEASE_NOTES_1.0.0rc2.md
      - GitHub Release Draft rc1: release/GITHUB_RELEASE_DRAFT_1.0.0rc1.md
      - GitHub Release Draft rc2: release/GITHUB_RELEASE_DRAFT_1.0.0rc2.md
  - Roadmap: ROADMAP.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
