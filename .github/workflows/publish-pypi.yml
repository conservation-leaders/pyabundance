name: Publish to PyPI (maintainer guarded draft)

on:
  workflow_dispatch:
    inputs:
      confirm_real_pypi:
        description: "Type publish-to-pypi to confirm this guarded production release"
        required: true
        default: "do-not-publish"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish-pypi:
    name: Build and publish to real PyPI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_real_pypi == 'publish-to-pypi'
    environment: pypi-release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@1.83
      - name: Install release tools
        run: python -m pip install --upgrade pip maturin twine
      - name: Build wheel and sdist
        run: |
          rm -rf dist
          maturin build --release --out dist
          maturin sdist --out dist
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
