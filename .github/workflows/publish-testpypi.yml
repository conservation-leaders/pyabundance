name: Publish to TestPyPI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build TestPyPI wheel ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2014"
            artifact: linux-x86_64
          - os: macos-13
            target: x86_64
            manylinux: "off"
            artifact: macos-x86_64
          - os: macos-14
            target: aarch64
            manylinux: "off"
            artifact: macos-arm64
          - os: windows-latest
            target: x64
            manylinux: "off"
            artifact: windows-x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist --compatibility pypi
          manylinux: ${{ matrix.manylinux }}
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-wheel-${{ matrix.artifact }}
          path: dist/*.whl

  build-sdist:
    name: Build TestPyPI sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build sdist
        run: maturin sdist --out dist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-sdist
          path: dist/*.tar.gz

  publish-testpypi:
    name: Publish artifacts to TestPyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: testpypi-*
          path: dist
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Check distributions
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*
      - name: Upload checked dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-dist
          path: dist/*
      - name: Publish to TestPyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verbose: true
